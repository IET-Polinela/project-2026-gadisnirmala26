{% extends 'base.html' %}

{% block title %}Hapus Laporan | CleanPulse{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/">Home</a></li>
        <li class="breadcrumb-item"><a href="{% url 'report_list' %}">Reports</a></li>
        <li class="breadcrumb-item active" aria-current="page">Hapus Laporan</li>
    </ol>
</nav>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="page-card p-4 p-md-5 text-center">
            <div class="mb-3">
                <i class="bi bi-exclamation-circle text-danger" style="font-size: 4rem;"></i>
            </div>

            <h1 class="page-title">Hapus Laporan</h1>
            <p class="text-muted mb-4">
                Apakah kamu yakin ingin menghapus laporan
                <strong>"{{ report.title }}"</strong>?
            </p>

            <form method="post">
                {% csrf_token %}
                <div class="d-flex justify-content-center gap-2 flex-wrap">
                    <a href="{% url 'report_list' %}" class="btn btn-secondary btn-soft px-4">Batal</a>
                    <button type="submit" class="btn btn-danger btn-soft px-4"
                            onclick="return confirm('Yakin ingin menghapus laporan ini?')">
                        Hapus
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
