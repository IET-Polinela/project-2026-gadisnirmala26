<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal CleanPulse</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(223,244,255,0.45), rgba(223,244,255,0.45)),
                        url('https://images.unsplash.com/photo-1514565131-fce0801e5785?q=80&w=1600&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }
        .navbar { background-color: rgba(0, 16, 43, 0.88); backdrop-filter: blur(8px); }
        .login-card { background: rgba(255,255,255,0.96); border-radius: 30px; padding: 40px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); 
            backdrop-filter: blur(6px); }
        .logo-title { color: #0d8fd8; font-weight: bold; }
        .form-control { border-radius: 14px; padding: 12px; }
        .btn-login { background-color: #0ea5e9; border: none; border-radius: 30px;padding: 12px; 
            color: white; 
            font-weight: bold; }
        .btn-login:hover { background-color: #0284c7; color: white; }
        .dashboard-card { 
            transition: 0.3s ease; 
            background: rgba(255,255,255,0.78);
            border-radius: 24px; 
            border: none; 
            box-shadow: 0 8px 28px rgba(0,0,0,0.12); 
            backdrop-filter: blur(8px); 
        }
        .dashboard-card:hover { transform: translateY(-4px); }
        .menu-btn { transition: 0.3s ease; border-radius: 14px; padding: 12px; }
        .menu-btn:hover { transform: scale(1.02); }
        .alert { border-radius: 16px; }

        .modal-content{border:none;border-radius:24px;overflow:
            hidden;background:rgba(150, 203, 218, 0.95);
            backdrop-filter:blur(10px); box-shadow:0 15px 40px rgba(0,0,0,.2);}
        .modal-header{background:linear-gradient(135deg,#3ebbc4,#0dcaf0);
            border:none; padding:20px 25px;}
        .modal-title{font-weight:700;}
        .modal-subtitle{font-size:.9rem; opacity:.85;}
        .modal-body{padding:30px;}
        .modal-body .form-control,
        .modal-body .form-select{border-radius:14px; padding:12px;
            background:#f8fbff; border:2px solid #e7eef5;}
        .modal-body .form-control:focus,
        .modal-body .form-select:focus{border-color:#0dcaf0; box-shadow:0 0 12px rgba(13,202,240,.2);}
        .modal-footer{padding:20px 25px;}
        #btnDraft{border-radius:14px; padding:10px 20px; background:linear-gradient(135deg,#ffffff,#b5cdd4);}
        #btnSubmit{border:none; border-radius:14px;
            padding:10px 24px; background:linear-gradient(135deg,#194761,#b5cdd4);}
    </style>
</head>
<body>
    <nav class="navbar navbar-dark px-4 py-3">
        <a class="navbar-brand fw-bold" href="#dashboard">
            <i class="bi bi-droplet-fill me-2"></i> CleanPulse Portal
        </a>
        <div class="text-white fw-semibold" id="navbar-user"></div>
    </nav>
    <div id="alert-container"></div>
    <main class="container-fluid px-4 mt-4" id="app-content"></main>
    
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Modal Tambah Laporan -->
<div class="modal fade" id="reportModal" tabindex="-1" aria-labelledby="reportModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header text-white">
                <div>
                    <h5 class="modal-title mb-1" id="reportModalLabel">
                        <i class="bi bi-pencil-square me-2"></i>Buat Laporan Baru
                    </h5>
                    <small class="modal-subtitle">
                        Laporkan masalah kota secara cepat dan real-time
                    </small>
                </div>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <form id="reportForm">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-card-text me-2"></i>Judul Laporan
                        </label>
                        <input type="text" id="reportTitle" class="form-control" placeholder="Masukkan judul laporan">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-tag me-2"></i>Kategori
                        </label>
                        <div class="position-relative">
                        <select id="reportCategory" class="form-select">
                            <option value="">Pilih Kategori</option>
                            <option value="Infrastruktur">Infrastruktur</option>
                            <option value="Kebersihan">Kebersihan</option>
                            <option value="Keamanan">Keamanan</option>
                            <option value="Lingkungan">Lingkungan</option>
                            <option value="Transportasi">Transportasi</option>
                        </select>
                        <i class="bi bi-chevron-down position-absolute" style="right:15px;top:50%;transform:translateY(-50%);pointer-events:none;">
                        </i>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-geo-alt me-2"></i>Lokasi
                        </label>
                        <input type="text" id="reportLocation" class="form-control" placeholder="Masukkan lokasi kejadian">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-chat-left-text me-2"></i>Deskripsi
                        </label>
                        <textarea id="reportDescription" class="form-control" rows="4"
                        placeholder="Jelaskan permasalahan yang terjadi..."></textarea>
                    </div>

                </form>
            </div>

            <div class="modal-footer justify-content-between">
                <button type="button" class="btn btn-outline-secondary" id="btnDraft">
                    <i class="bi bi-save me-2"></i>Simpan Draft
                </button>

                <button type="button" class="btn btn-primary" id="btnSubmit">
                    <i class="bi bi-send me-2"></i>Ajukan
                </button>
            </div>

        </div>
    </div>
</div>
</body>
</html>
