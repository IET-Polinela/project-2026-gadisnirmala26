<!DOCTYPE html>
<html>
<head>
<title>Hapus Laporan - CleanPulse</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to bottom right, #ffffff, #bae6fd);
}

.container {
    width: 50%;
    margin: auto;
    margin-top: 100px;
    text-align: center;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
}

h2 {
    color: #dc2626;
}

.btn {
    display: inline-block;
    margin: 10px;
    padding: 8px 15px;
    background-color: #38bdf8;
    color: white;
    text-decoration: none;
    border-radius: 50px;
    font-size: 14px;
    border: none;
    cursor: pointer;
}

.btn-danger {
    background-color: #ef4444;
}

.btn-danger:hover {
    background-color: #dc2626;
}

.btn:hover {
    background-color: #0ea5e9;
}
</style>

</head>

<body>

<div class="container">

    <div class="card">
        <h2>⚠️ Hapus Laporan</h2>

        <p>Apakah kamu yakin ingin menghapus laporan:</p>
        <b>{{ object.title }}</b>

        <form method="post">
            {% csrf_token %}
            <br>
            <button type="submit" class="btn btn-danger">Ya, Hapus</button>
            <a href="/reports/" class="btn">Batal</a>
        </form>
    </div>

</div>

</body>
</html>
