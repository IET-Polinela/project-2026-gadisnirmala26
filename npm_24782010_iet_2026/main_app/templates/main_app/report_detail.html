<!DOCTYPE html>
<html>
<head>
<title>Detail Laporan - CleanPulse</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to bottom right, #ffffff, #bae6fd);
}

.container {
    width: 60%;
    margin: auto;
    margin-top: 50px;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
}

h1 {
    text-align: center;
    color: #0284c7;
}

.btn {
    display: inline-block;
    margin-top: 15px;
    padding: 8px 15px;
    background-color: #38bdf8;
    color: white;
    text-decoration: none;
    border-radius: 50px;
    font-size: 14px;
}

.btn:hover {
    background-color: #0ea5e9;
}
</style>

</head>

<body>

<div class="container">

    <h1>📄 Detail Laporan</h1>

    <div class="card">
        <b>Title:</b> {{ report.title }} <br><br>
        <b>Category:</b> {{ report.category }} <br><br>
        <b>Description:</b> {{ report.description }} <br><br>
        <b>Location:</b> {{ report.location }} <br><br>
        <b>Status:</b> {{ report.status }} <br><br>

        <a href="/reports/" class="btn">Kembali</a>
    </div>

</div>

</body>
</html>
