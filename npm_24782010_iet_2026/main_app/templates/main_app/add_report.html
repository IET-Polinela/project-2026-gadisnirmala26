<!DOCTYPE html>
<html>
<head>
<title>Tambah Laporan - CleanPulse</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to bottom right, #ffffff, #bae6fd);
}

.container {
    width: 50%;
    margin: auto;
    margin-top: 60px;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0px 5px 20px rgba(0,0,0,0.1);
}

h1 {
    text-align: center;
    color: #0284c7;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

.btn {
    display: inline-block;
    padding: 12px 25px;
    background-color: #38bdf8;
    color: white;
    text-decoration: none;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

.btn:hover {
    background-color: #0ea5e9;
}

.nav {
    text-align: center;
    margin-top: 20px;
}
</style>

</head>

<body>

<div class="container">

    <div class="card">

        <h1>➕ Tambah Laporan</h1>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="btn">Simpan</button>
        </form>

    </div>

    <div class="nav">
        <a href="/" class="btn">Home</a>
        <a href="/reports/" class="btn">Data</a>
    </div>

</div>

</body>
</html>
